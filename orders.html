<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - LuxeBags</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="nav">
                <a href="index.html" class="nav-brand">LUXEBAGS</a>
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="shop.html" class="nav-link">Shop</a>
                    <a href="orders.html" class="nav-link active">My Orders</a>
                </div>
                <div class="nav-actions">
                    <button class="btn btn-ghost" id="theme-toggle" title="Toggle Dark Mode">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <main style="padding-top: 56px;">
        <section class="container">
            <h1 class="h1" style="font-size: 24px; font-weight: 600; margin-bottom: 24px;">My Orders</h1>

            <div id="orders-container">
                <div class="skeleton product-card" style="height: 200px;"></div>
            </div>
        </section>
    </main>

    <div class="modal-backdrop" id="tracking-modal-backdrop"></div>
    <div class="modal" id="tracking-modal">
        <div class="flex-between mb-4">
            <h2 class="h2" style="font-size: 20px; font-weight: 600;">Order Tracking</h2>
            <button class="btn btn-ghost" id="close-tracking">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div id="tracking-content"></div>
    </div>

    <script type="module">
        import { initAuth, isAuthenticated, getUser } from './js/auth.js';
        import { loadUserOrders } from './js/orders.js';
        import { formatCurrency, formatDate } from './js/utils.js';

        const initOrders = async () => {
            if (!isAuthenticated()) {
                window.location.href = 'login.html?redirect=orders.html';
                return;
            }

            initAuth();
            await loadOrders();
        };

        const loadOrders = async () => {
            const user = getUser();
            const result = await loadUserOrders(user.uid);
            const container = document.getElementById('orders-container');

            if (!result.success || result.orders.length === 0) {
                container.innerHTML = '<p class="text-center body-text" style="color: var(--text-tertiary);">No orders found</p>';
                return;
            }

            container.innerHTML = `
                <div style="overflow-x: auto;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Order #</th>
                                <th>Date</th>
                                <th>Items</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Payment</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${result.orders.map(order => `
                                <tr>
                                    <td class="body-text">${order.orderNumber}</td>
                                    <td class="body-text">${formatDate(order.createdAt)}</td>
                                    <td class="body-text">${order.items?.length || 1} item(s)</td>
                                    <td class="body-text">${formatCurrency(order.total)}</td>
                                    <td><span class="badge badge-${order.orderStatus === 'delivered' ? 'success' : 'error'}">${order.orderStatus}</span></td>
                                    <td><span class="badge ${order.paymentStatus === 'success' ? 'badge-success' : 'badge-error'}">${order.paymentStatus}</span></td>
                                    <td>
                                        <button class="btn btn-secondary btn-small view-tracking" data-id="${order.id}">Track</button>
                                        <button class="btn btn-primary btn-small download-receipt" data-id="${order.id}" style="margin-left: 8px;">Receipt</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            document.querySelectorAll('.view-tracking').forEach(btn => {
                btn.addEventListener('click', () => showTracking(btn.dataset.id));
            });

            document.querySelectorAll('.download-receipt').forEach(btn => {
                btn.addEventListener('click', () => downloadReceipt(btn.dataset.id));
            });
        };

        const showTracking = (orderId) => {
            document.getElementById('tracking-modal-backdrop').classList.add('active');
            document.getElementById('tracking-modal').classList.add('active');
            document.getElementById('tracking-content').innerHTML = '<div class="flex-center"><div style="width: 40px; height: 40px; border: 4px solid var(--border-light); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;"></div></div>';

            loadUserOrders(getUser().uid).then(result => {
                const order = result.orders.find(o => o.id === orderId);
                if (order) {
                    let timeline = '';
                    const statuses = ['pending', 'processing', 'packed', 'shipped', 'delivered'];
                    const currentStatusIndex = statuses.indexOf(order.orderStatus);

                    statuses.forEach((status, index) => {
                        const isCompleted = index <= currentStatusIndex;
                        const isActive = index === currentStatusIndex;
                        timeline += `
                            <div class="flex-center gap-3 mb-3">
                                <div style="width: 32px; height: 32px; border-radius: 50%; background: ${isCompleted ? 'var(--primary)' : 'var(--border-light)'}; display: flex; align-items: center; justify-content: center; color: white;">
                                    ${isCompleted ? '✓' : ''}
                                </div>
                                <div>
                                    <strong class="body-text">${status.charAt(0).toUpperCase() + status.slice(1)}</strong>
                                    ${isActive ? '<span class="caption" style="color: var(--text-tertiary);">(Current)</span>' : ''}
                                </div>
                            </div>
                        `;
                    });

                    document.getElementById('tracking-content').innerHTML = timeline;
                }
            });
        };

        const downloadReceipt = (orderId) => {
            loadUserOrders(getUser().uid).then(result => {
                const order = result.orders.find(o => o.id === orderId);
                if (order) {
                    localStorage.setItem('last_order', JSON.stringify(order));
                    window.open('order-confirmation.html', '_blank');
                }
            });
        };

        document.getElementById('close-tracking').addEventListener('click', () => {
            document.getElementById('tracking-modal').classList.remove('active');
            document.getElementById('tracking-modal-backdrop').classList.remove('active');
        });

        document.getElementById('tracking-modal-backdrop').addEventListener('click', () => {
            document.getElementById('tracking-modal').classList.remove('active');
            document.getElementById('tracking-modal-backdrop').classList.remove('active');
        });

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark-mode', document.body.classList.contains('dark-mode'));
        });

        if (localStorage.getItem('dark-mode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        document.addEventListener('DOMContentLoaded', initOrders);
    </script>
    <script src="js/whatsapp.js"></script>
</body>
</html>
