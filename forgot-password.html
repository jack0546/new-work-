<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - LuxeBags</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="nav">
                <a href="index.html" class="nav-brand">LUXEBAGS</a>
                <a href="index.html" class="btn btn-secondary btn-medium">Back to Home</a>
            </nav>
        </div>
    </header>

    <main style="padding: 120px 0; min-height: 100vh; background-color: var(--pure-white);">
        <div class="container" style="max-width: 400px; margin: 0 auto;">
            <div class="card" style="padding: 40px;">
                <h2 class="text-center mb-3 h2" style="font-size: 24px; font-weight: 600;">Reset Password</h2>
                <p class="text-center mb-4 body-text" style="color: var(--text-secondary);">Enter your email to receive a reset link</p>

                <form id="forgot-form">
                    <div class="mb-3">
                        <label for="email" class="label">Email Address</label>
                        <input type="email" id="email" class="input" placeholder="Enter your email" required>
                    </div>

                    <div id="error-message" class="text-danger" style="display: none; font-size: 14px; margin-bottom: 12px;"></div>
                    <div id="success-message" class="badge-success" style="display: none; font-size: 14px; margin-bottom: 12px; padding: 8px 12px; border-radius: 8px; background-color: #E8F5E9; color: #2E7D32; border: 1px solid #81C784;"></div>

                    <button type="submit" class="btn btn-primary w-100 mb-3" id="submit-btn">Send Reset Link</button>

                    <div class="text-center">
                        <a href="login.html" style="color: var(--primary);">Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script type="module">
        import { forgotPassword } from './js/auth.js';
        import { showToast } from './js/utils.js';

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('forgot-form');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('email').value;

                try {
                    await forgotPassword(email);
                    document.getElementById('success-message').style.display = 'block';
                    document.getElementById('success-message').textContent = 'Password reset email sent. Check your inbox.';
                    showToast('Password reset email sent!', 'success');
                } catch (error) {
                    document.getElementById('error-message').textContent = error.message;
                    document.getElementById('error-message').style.display = 'block';
                }
            });
        });
    </script>
    <script src="js/whatsapp.js"></script>
</body>
</html>
